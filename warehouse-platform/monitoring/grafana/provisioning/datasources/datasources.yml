apiVersion: 1

# ============================================================
#  Grafana Datasource Provisioning
#  Autonomous Warehouse Inventory Audit Platform
# ============================================================

datasources:

  - name: Prometheus
    type: prometheus
    access: proxy
    uid: warehouse-prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      scrapeInterval: "15s"
      queryTimeout: "60s"
      timeInterval: "15s"
      incrementalQuerying: true
      incrementalQueryOverlapWindow: "10m"
      disableMetricsLookup: false
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: warehouse-tempo
    version: 1

  # Uncomment when Loki is added for log aggregation:
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   uid: warehouse-loki
  #   url: http://loki:3100
